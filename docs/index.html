<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>电商反欺诈智能风控 Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">AI 智能风控分析工作台</p>
        <h1>电商反欺诈智能风控 Agent</h1>
      </div>
      <div class="status-pill" id="harnessStatus">评测加载中</div>
    </header>

    <main>
      <section class="metric-band" aria-label="项目指标">
        <div class="metric">
          <span>OOT ROC-AUC</span>
          <strong id="rocAuc">--</strong>
        </div>
        <div class="metric">
          <span>OOT PR-AUC</span>
          <strong id="prAuc">--</strong>
        </div>
        <div class="metric">
          <span>Top 5% 审核提升</span>
          <strong id="topLift">--</strong>
        </div>
        <div class="metric">
          <span>极短购买提升</span>
          <strong id="fastLift">--</strong>
        </div>
      </section>

      <section class="workspace">
        <aside class="scenario-panel">
          <div class="panel-header">
            <h2>生成案例</h2>
            <button id="nextCase" type="button">下一个案例</button>
          </div>
          <div id="caseList" class="case-list"></div>
        </aside>

        <section class="decision-panel">
          <div class="decision-header">
            <div>
              <p class="eyebrow" id="scenarioName">场景</p>
              <h2 id="caseId">案例</h2>
            </div>
            <div class="decision-badge" id="decisionBadge">--</div>
          </div>

          <div class="score-grid">
            <div>
              <span>规则分</span>
              <strong id="ruleScore">--</strong>
            </div>
            <div>
              <span>模型分</span>
              <strong id="modelScore">--</strong>
            </div>
            <div>
              <span>综合风险分</span>
              <strong id="finalScore">--</strong>
            </div>
            <div>
              <span>风险等级</span>
              <strong id="riskLevel">--</strong>
            </div>
          </div>

          <div class="columns">
            <section>
              <h3>交易信息</h3>
              <dl id="transactionFacts" class="facts"></dl>
            </section>
            <section>
              <h3>AI 风险摘要</h3>
              <p id="aiSummary" class="summary"></p>
              <p id="limitations" class="limitations"></p>
            </section>
          </div>

          <section>
            <h3>风险原因码</h3>
            <div id="reasonCodes" class="reason-grid"></div>
          </section>

          <section>
            <h3>策略证据</h3>
            <div id="policyCitations" class="citation-list"></div>
          </section>

          <section>
            <h3>工具调用链路</h3>
            <div id="trace" class="trace"></div>
          </section>
        </section>
      </section>

      <section class="bottom-grid">
        <section class="table-panel">
          <h2>TopK 人工审核策略</h2>
          <table>
            <thead>
              <tr>
                <th>TopK</th>
                <th>审核量</th>
                <th>召回欺诈</th>
                <th>准确率</th>
                <th>召回率</th>
                <th>提升倍数</th>
              </tr>
            </thead>
            <tbody id="topkTable"></tbody>
          </table>
        </section>

        <section class="harness-panel">
          <h2>自动化评测</h2>
          <div id="harnessList" class="harness-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
